#
# Please consult the `Deployment` section in the docs if you want to deploy
# this. You *need* to keep this nginx service, even if you have your own,
# otherwise the static files will not be served correctly! If you do remove
# it, configure yours similarly to what's in config/nginx.conf
# Also take a look at the "Static files" section in the .env file

services:
  web:
    image: docker.io/wger/server:latest
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    env_file:
      - ./config/prod.env
    volumes:
      - static:/home/wger/static
      - media:/home/wger/media
    expose:
      - 8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      start_period: 300s
      retries: 5
    restart: unless-stopped

  powersync:                       # merged from ./services/powersync.yaml
    image: docker.io/journeyapps/powersync-service:latest
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    command: ["start", "-r", "unified"]
    volumes:
      # NOTE: this path was ./config-powersync when it lived in services/powersync.yaml
      # (relative to that file). Merged up to the root compose it becomes services/config-powersync.
      - ./services/config-powersync:/config:ro
    env_file:
      - ./config/prod.env
    environment:
      POWERSYNC_CONFIG_PATH: /config/powersync.yaml
      PS_JWKS_URL: http://web:8000/api/v2/powersync-keys
    expose:
      - 8080
      - 9090
    restart: unless-stopped

  nginx:
    image: docker.io/nginx:stable
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    depends_on:
      - web
      - powersync
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
      - static:/wger/static:ro
      - media:/wger/media:ro
    # Ports removed for Coolify: its proxy owns host 80 and routes here via the
    # "Domains for nginx" field. Re-add for a standalone `docker compose up`.
    #ports:
    #  - "80:80"
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  db:                              # merged from ./services/postgres.yaml
    image: docker.io/postgres:15-alpine
    shm_size: 256mb
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: 5
    env_file:
      - ./config/prod.env
    environment:
      - TZ=Europe/Berlin
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    expose:
      - 5432
    command: [
      "postgres",
      "-c", "wal_level=logical",
      "-c", "shared_buffers=256MB",
      "-c", "effective_cache_size=768MB",
      "-c", "work_mem=8MB",
      "-c", "random_page_cost=1.1",
      "-c", "max_connections=30"
    ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  cache:                           # merged from ./services/redis.yaml
    image: docker.io/redis
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    expose:
      - 6379
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data:/data
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

    # You probably want to limit the memory usage of the cache, otherwise it might
    # hog all the available memory. Remove or change according to your needs.
    #mem_limit: 5gb

  celery_worker:
    image: docker.io/wger/server:latest
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    command: /start-worker
    env_file:
      - ./config/prod.env
    volumes:
      - media:/home/wger/media
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "wger", "inspect", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  celery_beat:
    image: docker.io/wger/server:latest
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    command: /start-beat
    volumes:
      - celery-beat:/home/wger/beat/
    env_file:
      - ./config/prod.env
    depends_on:
      celery_worker:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  celery-beat:
  redis-data:

  # Heads up, if you remove these volumes and use folders directly you need to chown them
  # to the UID and GID 1000 even if it doesn't exist on your system. Also, they should
  # be readable by everyone.
  #
  # https://wger.readthedocs.io/en/latest/administration/errors.html#missing-static-files
  media:
  static:

networks:
  default:
    name: wger_network

# `include:` removed — Coolify does not expand it (deploy fails with
# "service db has neither an image nor a build context"). The db / cache /
# powersync services from services/*.yaml are now inlined above.